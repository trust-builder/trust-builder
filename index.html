<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustBuilder | Premium Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gamma-bg: radial-gradient(at top left, #f8fafc, #e2e8f0);
            /* Fondo con profundidad */
            --navy-deep: #0f172a;
            --text-main: #000000;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--gamma-bg);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Barra superior exacta a la imagen */
        .top-nav {
            background-color: var(--navy-deep);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Contenedor Estructurado */
        .glass-shell {
            max-width: 1100px;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            padding: 0 1.5rem;
        }

        @media (min-width: 1024px) {
            .glass-shell {
                grid-template-columns: 360px 1fr;
            }
        }

        /* Tarjetas Estilo Gamma (Efecto Elevado) */
        .card-gamma {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* Inputs Modernos sin bordes pesados */
        .input-premium {
            background: #f1f5f9;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .input-premium:focus {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        /* Botón con el estilo de la captura */
        .btn-gamma {
            background: var(--navy-deep);
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.2s ease;
        }

        .btn-gamma:hover {
            transform: translateY(-2px);
            background: #1e293b;
        }

        .artisan-row {
            background: white;
            border-radius: 16px;
            padding: 1.25rem 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <span class="text-white font-extrabold text-lg tracking-tight">TrustBuilder</span>
        </div>
        <div class="flex items-center gap-2 bg-white/10 px-4 py-1.5 rounded-full border border-white/20">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-black text-slate-200 uppercase tracking-widest">Motor Online</span>
        </div>
    </nav>

    <main class="glass-shell">

        <aside>
            <div class="card-gamma">
                <h2 class="text-sm font-extrabold uppercase tracking-widest mb-8 flex items-center gap-2">
                    <span class="w-1 h-4 bg-blue-600 rounded-full"></span>
                    Nuevo Registro
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-1">Nombre y
                            Apellido</label>
                        <input id="nombre" type="text" placeholder="Ej. Juan Pérez" class="input-premium w-full">
                    </div>
                    <div>
                        <label
                            class="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-1">Especialidad</label>
                        <input id="especialidad" type="text" placeholder="Ej. Electricista"
                            class="input-premium w-full">
                    </div>
                    <button onclick="enviarDatos()" class="btn-gamma w-full mt-4">Guardar en Base de Datos</button>
                </div>
            </div>
        </aside>

        <section>
            <div class="flex items-center justify-between mb-6 px-2">
                <h3 class="text-[11px] font-black uppercase tracking-[0.3em] text-slate-400">Directorio de Artesanos
                </h3>
            </div>

            <div id="lista-artesanos">
            </div>
        </section>

    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        async function init() {
            try { await fetch(`${API_URL}/`); listarArtesanos(); } catch (e) { console.warn("API Offline"); }
        }

        async function enviarDatos() {
            const n = document.getElementById('nombre');
            const e = document.getElementById('especialidad');
            if (!n.value || !e.value) return;

            await fetch(`${API_URL}/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: n.value, especialidad: e.value })
            });

            n.value = ''; e.value = '';
            listarArtesanos();
        }

        async function votar(id, pts) {
            await fetch(`${API_URL}/valorar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ artesano_id: id, puntos: pts })
            });
            listarArtesanos();
        }

        async function listarArtesanos() {
            const res = await fetch(`${API_URL}/artesanos`);
            const data = await res.json();
            const box = document.getElementById('lista-artesanos');
            box.innerHTML = "";

            data.artesanos.forEach(art => {
                box.innerHTML += `
                    <div class="artisan-row">
                        <div>
                            <span class="text-[8px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase mb-1 inline-block tracking-tighter">Validado</span>
                            <h4 class="text-sm font-extrabold uppercase text-black tracking-tight">${art.nombre}</h4>
                            <p class="text-[11px] font-bold text-slate-400 uppercase">${art.especialidad}</p>
                        </div>
                        <div class="text-right border-l border-slate-100 pl-8">
                            <div class="text-[10px] font-black text-black mb-1">REPUTACIÓN: ${art.puntuacion.toFixed(1)}</div>
                            <div class="flex gap-1">
                                ${[1, 2, 3, 4, 5].map(i => `
                                    <button onclick="votar(${art.id}, ${i})" class="text-xl ${i <= Math.round(art.puntuacion) ? 'text-yellow-400' : 'text-slate-200'} transition hover:scale-125">★</button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        init();
    </script>
</body>

</html>
